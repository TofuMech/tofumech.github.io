<!DOCTYPE html>
<html>
<head>
    <title>TofuMech</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="description" content="Artist and Tech Guy">
    <meta name="viewport" content="width=device-width, intial-scale=1">
    <link rel="icon" href="tofuicon.png">
</head>
<header>
    
    <nav>
        <script src="script.js"></script>
        <img id="moon" src="images/navImages/moon.png">
        <img id="sun" src="images/navImages/sun.png">
        <div class="navBar">
            <!--For Mobile, the three lines on the top that animate when interacted with-->
            <button id="DropDownMenu">
                <div class="bar1"></div>
                <div class="bar2" id="bar2"></div>
                <div class="bar3" id="bar3"></div>
            </button>

            <!--Desktop button navigation-->
            <div class="aboutButton" tabindex="5" onclick="location.href='about.html'">
                <div class="aboutText">ABOUT</div>
            </div>
            <div class="wordButton" tabindex="4" onclick="location.href='words.html'">
                <div class="wordText"></div>
            </div>
           
            <div class="artworkButton" tabindex="2"  onclick="location.href='portfolio.html'">
                <div class="artText">ARTWORK</div>
            </div>
            <div class="homeButton" tabindex="1" onclick="location.href='index.html'">
                <div class="homeText">HOME</div>
            </div>
        </div>

            <!--The Container for the Drop Down Menu on Mobile-->
             <div class="box" id="box"> 
            <button id="DropHomeButton" onclick="location.href='index.html'">HOME</button><br>
            <button id="DropHomeButton" onclick="location.href='portfolio.html'">ARTWORK</button><br>
            <button id="DropHomeButton" onclick="location.href='about.html'">ABOUT</button><br>
            <!--<button id="DropHomeButton" onclick="location.href='words.html'"></button><br>-->
            <script src="script.js"></script>
        </div>
        <div class="colormodeHolder"></div>
    </nav>
    <div class="homeTitle">
        <h1>TOFUMECH</h1>
        <div class="hometitleTagline" id="hometitleTagline">
            <body onload="displayRandomText()"></body>
    </div>

    <div class="socialmediaLinks">
        <p>
            <a href="https://bsky.app/profile/tofumech.bsky.social">BLUESKY</a>
            <a href="https://www.artstation.com/tofumech">ARTSTATION</a>
            <a href="https://github.com/TofuMech">GITHUB</a>
            <style>
                a {
                position: relative;
                padding-right: 10px;
                text-decoration: none;
                color: inherit;
                }
            </style>
        </p>
</header>
<body>
    <div class="halftone"></div>
    <main>

        <div class="artCard" onclick="location.href='https://www.artstation.com/artwork/Ry0BNW'" >
            <div class="artcardImage"></div>
            <div class="art-card-content">
                <h2 class="art-card-title">New Art</h2>
                <p class="art-card-body"></p>
                <a id="artlink" href="#" onclick="location.href='https://www.artstation.com/artwork/Ry0BNW'" class="button">View On Artstation </a>

                <style>

                    #artlink {
                        position: relative;
                        bottom: 15px;
                        -webkit-text-stroke: 1px rgb(0, 0, 0);

                    }
                        .artCard {
                            overflow: hidden;
                            position: absolute;
                            top: 250px;
                            color:var(--text-color);
                            width: 71%;
                            padding-top: 15em;
                            right: 13%;
                            font-family: 'Big Shoulders Display', cursive;
                            font-family: 'Lilita One', cursive;
                            font-size: larger;
                            text-align: center;
                            z-index: -3;
                            border-radius: 5px;
                            filter: drop-shadow(0 10px 10px #131736d3);
                            cursor: pointer;
                            background-image: url(images/44.jpg);
                            background-repeat: no-repeat;
                            background-position: 50%;
                            background-size: cover;
                            -webkit-text-stroke: 1px rgb(0, 0, 0);
                            
            }
        
           
            .art-card-content {
                
                padding: var(--padding);
                border-radius: 5px;
                background: linear-gradient(hsla(0, 0%, 0%, 0),
                        hsla(0, 0%, 0%, 0) 1%,
                        hsl(0 0% 0% / 1));
            }
        
            .art-card-title {
                position: relative;
                bottom: 15px;
                right: 5px;
            }
        
            .art-card-title::after {
                content: "";
                position: absolute;
                height: 6px;
                left: 0px;
                top: 30px;
                width: 100%;
                background: linear-gradient(to left, #33333300, var(--button-colorOne) 50%);
            }
            </style>

            </div>
        </div>


            <div class="musicCard">
                <div class="music-card-content">
                        <h2 class="music-card-title">LOCKED</h2>
                        <p class="music-card-body"></p>
                </div>
            <style>
                .musicCard {
                position: absolute;
                background-image: url(images/navImages/piano.jpg);
                background-size: cover;
                top: 1050px;
                width: 71%;
                padding-top: 15em;
                right: 13%;
                color:var(--text-color);
                font-family: 'Big Shoulders Display', cursive;
                font-family: 'Lilita One', cursive;
                font-size: large;
                text-align: center;
                z-index: -3;
                border-radius: 5px;
                filter: drop-shadow(0 10px 10px #131736d3);
                -webkit-text-stroke: 0.5px rgb(0, 0, 0);

                
            }

            .musicCard:hover {
                animation: shake 0.5s;
                animation-iteration-count: 2s;
            }

            @keyframes shake {
                0% { transform: translate(1px, 1px) rotate(0deg); }
                10% { transform: translate(-1px, -2px) rotate(-1deg); }
                20% { transform: translate(-3px, 0px) rotate(1deg); }
                            }
        
            .music-card-content {
                padding: var(--padding);
                border-radius: 5px;
                background: linear-gradient(hsla(0, 0%, 0%, 0),
                        hsla(0, 0%, 0%, 0) 1%,
                        hsl(0 0% 0% / 1));
        
            }
        
            .music-card-title {
                position: relative;
        
            }
        
            .music-card-title::after {
                content: "";
                position: absolute;
                height: 6px;
                left: 0px;
                top: 28px;
                width: 100%;
                background: linear-gradient(to left, #33333300, var(--button-colorOne) 50%);
        
            }
            </style>
        </div>

        
        <div class="blogCard">
            <div class="blog-card-content">
                <h2 class="blog-card-title">LOCKED</h2>
                <p class="blog-card-body"></p>
                <a href="#" onclick="location.href='words.html'" class="button"><!--Game Engine Workshop/Yappin--></a>
            </div>

            <style>
            .blogCard {
                position: absolute;
                background-image: url(images/navImages/words.jpg);
                background-size: cover;
                top: 680px;
                width: 71%;
                padding-top: 15em;
                right: 13%;
                color:var(--text-color);
                font-family: 'Big Shoulders Display', cursive;
                font-family: 'Lilita One', cursive;
                font-size: medium;
                text-align: center;
                z-index: -3;
                border-radius: 5px;
                filter: drop-shadow(0 10px 10px #131736d3);
                -webkit-text-stroke: 0.5px rgb(0, 0, 0);

                

            }
            .blogCard:hover {
                animation: shake 0.5s;
                animation-iteration-count: 2s;
            }

            @keyframes shake {
                0% { transform: translate(1px, 1px) rotate(0deg); }
                10% { transform: translate(-1px, -2px) rotate(-1deg); }
                20% { transform: translate(-3px, 0px) rotate(1deg); }
                            }

            a {
                -webkit-text-stroke-width: .1px;
                -webkit-text-stroke-color: black;
            }
        
        
            .blog-card-content {
                padding: var(--padding);
                border-radius: 5px;
                background: linear-gradient(hsla(0, 0%, 0%, 0),
                        hsla(0, 0%, 0%, 0) 1%,
                        hsl(0 0% 0% / 1));
                        
        
            }
        
            .blog-card-title {
                position: relative;
                bottom: 15px;
                right: 5px;
                
            }
        
            .blog-card-title::after {
                content: "";
                position: absolute;
                height: 6px;
                left: 0px;
                top: 30px;
                width: 100%;
                background: linear-gradient(to left, #33333300, var(--button-colorOne) 50%);
                
            }
            </style>
        </div>
        <style>
            a {
                text-decoration: none;
        
        
            }
        
            a,
            a :visited {
                color: inherit;
            }
        
            a:hover {
                color: rgb(255, 253, 106);
            }
        
            
        
            
        
            
        </style>
        
                
        </div>

    </main>
</body>
</html>
