<!DOCTYPE html>

<head>

    <script>
        function displayRandomText() {
            var quotes = [
                "[TAKE YOUR TIME]",
                "[LOADING..]",
                "[DRINK WATER]",
                "[CLEAN YOUR SCREEN]",
                "[DESTROY THE INTERNET]",
                "[I GET NO KICK FROM CHAMPAGNE]",
                "[ADULT SWIM]"
            ];
            var randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("randomText").innerHTML = quotes[randomIndex];
        }
    </script>

    <style>
        .homeTitle {
            background-color: rgba(0, 17, 255, 0);
            width: 50%;
            height: 120px;
            position: absolute;
            left: 50%;
            top: 30px;
            transform: translate(-50%, -50%);
        }

        h1 {
            position: relative;
            color: rgb(241, 59, 89);
            text-align: center;
            font-size: 120px;
            font-family: "Bebas Neue", sans-serif;
            font-style: normal;
        }

        #randomText {
            color: rgb(241, 59, 89);
            position: relative;
            font-size: 35px;
            text-align: center;
            font-family: "Bebas Neue", sans-serif;
            font-style: normal;
            left: 6px;
            bottom: 90px;
            animation: pulsate 10s infinite;
        }

        @keyframes pulsate {
            0% {
                color: rgb(241, 59, 89);
            }

            50% {
                color: rgb(88, 23, 34);
            }

            100% {
                color: rgb(241, 59, 89);
            }
        }

        @media screen and (max-width: 1200px) {
            .homeTitle {
                background-color: rgba(0, 17, 255, 0);
                width: 100%;
                height: 120px;
                position: absolute;
                left: 50%;
                top: 30px;
                transform: translate(-50%, -50%);
            }

            h1 {
                position: relative;
                color: rgb(241, 59, 89);
                justify-content: center;
                font-size: 120px;
                font-family: "Bebas Neue", sans-serif;
                font-style: normal;
            }

            #randomText {
                color: rgb(241, 59, 89);
                position: relative;
                font-size: 35px;
                text-align: center;
                font-family: "Bebas Neue", sans-serif;
                font-style: normal;
                left: 6px;
            }
        }
    </style>
