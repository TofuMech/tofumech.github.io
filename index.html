<!DOCTYPE html>
<html>
<head>
    <!--Webpage Title-->
    <title>TofuMech</title>
    <!--CSS Link-->
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="description" content="Artist and Tech Guy">
    <meta name="viewport" content="width=device-width, intial-scale=1">
    <link rel="icon" href="tofuicon.png">
</head>
<header>
    <script src="script.js"></script>
    <img id="moon" src="moon.png">
    <img id="sun" src="sun.png">
    <nav>
        <div class="navBar">
            <button id="DropDownMenu"> 
                <div class="bar1"></div>
                <div class="bar2" id="bar2"></div>
                <div class="bar3" id="bar3"></div>
            </button>
            <div class="aboutButton" onclick="location.href='about.html'">
                <div class="aboutText">ABOUT</div>
            </div>
            <div class="portfolioButton" onclick="location.href='portfolio.html'">
                <div class="artText">ARTWORK</div>
            </div>
            <div class="homeButton" onclick="location.href='index.html'">
                <div class="homeText">HOME</div>
            </div>
        </div>
    </nav>
</header>
<main>
    <nav>
    <div class="box" id="box"> <!--The Container for the Drop Down Menu on Mobile-->
        <button id="DropHomeButton"onclick="location.href='index.html'">HOME</button><br>
        <button id="DropHomeButton"onclick="location.href='portfolio.html'">PORTFOLIO</button><br>
        <button id="DropHomeButton"onclick="location.href='about.html'">ABOUT</button><br>
        <script src="script.js"></script>
    </div>
    </nav>
    <div class="cube">
        <div class="face top"></div>
        <div class="face bottom"></div>
        <div class="face left"></div>
        <div class="face right"></div>
        <div class="face front"></div>
        <div class="face back"></div>
    </div>
    <style>
        @keyframes turn {
            from {
                transform: rotateX(1deg) rotateY(1deg);
            }
            to {
                transform: rotateX(359deg) rotateY(359deg);
            }
        }
        .cube {
            position: absolute;
            width: 100px;
            height: 100px;
            margin: auto;
            z-index: 0;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            transform-style: preserve-3d;
            animation: turn 10s infinite linear;
        }
        .cube:hover .face {
            --cube-color: #e9e9da;
            transition: all .2s ease-in;
        }
        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: var(--cube-color);
            transform: translateZ(50px);
            border-radius: 0px;
            transition: all .2s ease-in;
        }
        .front {
            transform: translateZ(50px);
        }
        .back {
            transform: translateZ(-50px) rotateY(180deg);
        }
        .left {
            transform: translateX(-50px) rotateY(-90deg);
        }
        .right {
            transform: translateX(50px) rotateY(90deg);
        }
        .top {
            transform: translateY(-50px) rotateX(90deg);
        }
        .bottom {
            transform: translateY(50px) rotateX(-90deg);
        }

        @media screen and (max-width: 800px) {

            
        @keyframes turn {
            from {
                transform: rotateX(1deg) rotateY(1deg);
            }
            to {
                transform: rotateX(359deg) rotateY(359deg);
            }
        }
        .cube {
            position: relative;
            width: 100px;
            height: 100px;
            margin: auto;
            z-index: -5;
           margin-top: 300px;
            transform-style: preserve-3d;
            animation: turn 10s infinite linear;
        }
        .cube:active .face {
            --cube-color: #e9e9da;
            transition: all .2s ease-in;
        }
        .face {
            position: absolute;
            top: 10px;
            width: 100px;
            height: 100px;
            background: var(--cube-color);
            transform: translateZ(50px);
            border-radius: 0px;
            transition: all .2s ease-in;
            z-index: -5;
        }
        .front {
            transform: translateZ(50px);
                        z-index: -5;

        }
        .back {
            transform: translateZ(-50px) rotateY(180deg);
                        z-index: -5;

        }
        .left {
            transform: translateX(-50px) rotateY(-90deg);
                        z-index: -5;

        }
        .right {
            transform: translateX(50px) rotateY(90deg);
                        z-index: -5;

        }
        .top {
            transform: translateY(-50px) rotateX(90deg);
                        z-index: -5;

        }
        .bottom {
            transform: translateY(50px) rotateX(-90deg);
                        z-index: -5;

        }
    
    }
        
    </style>
</main>
<footer>
    <div id="homeText">
        <script>
            function displayRandomText() {
                var quotes = [
                    "[TAKE YOUR TIME]",
                    "[LOADING..]",
                    "[DRINK WATER]",
                    "[CLEAN YOUR SCREEN]",
                    "[BOTTOM TEXT]"
                ];
                var randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById("homeText").innerHTML = quotes[randomIndex];
            }
        </script>
        <body onload="displayRandomText()"></body>
    </div>
</footer>
</body>
</html>
