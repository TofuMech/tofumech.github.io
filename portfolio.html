<style>
    .grid-container {
        position: absolute;
        padding-left: 170px;
        padding-right: 130px;
        display: grid;
        grid-template-columns: repeat(5, 30fr);
        z-index: -1;

    }

    .grid-container img {
        width: 90%;
        height: 90%;
        object-fit: cover;
        justify-items: center;
        border-radius: 5px;
        background-color: rgb(53, 53, 53);
        cursor: pointer;



    }

    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #overlay img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
    }

    @media screen and (max-width: 1200px) {

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 8fr);
            grid-column-gap: 10px;
            padding-left: 10px;
            padding-right: 10px;
            
        }
    }
</style>
<script>
    function openImage(img) {
        var overlay = document.getElementById("overlay");
        var overlayImg = overlay.getElementsByTagName("img")[0]; 
        
        overlayImg.src = img.src;
        overlay.style.display = "flex";
    }
    function closeImage() {
        var overlay = document.getElementById("overlay");

        overlay.style.display = "none";
    }


</script>

<footer>
    <button onclick="topFunction()" id="myBtn" title="Go to top">^</button>
    <style>
        #myBtn {
            display: none;
            position: fixed;
            top: 20px;
            right: 35px;
            z-index: 99;
            border: none;
            outline: none;
            background-color: rgba(65, 65, 65, 0.336);
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
            font-size: 42px;
        }

        #myBtn:hover {
            background-color: #707070;
        }
    </style>
    <script>

        let mybutton = document.getElementById("myBtn");


        window.onscroll = function () { scrollFunction() };

        function scrollFunction() {
            if (document.body.scrollTop > 750 || document.documentElement.scrollTop > 700) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        }


        function topFunction() {
            document.body.scrollTop = 0; // safari
            document.documentElement.scrollTop = 0; // everything else
        }
    </script>
