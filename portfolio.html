<style>
    .grid-container {
        position: absolute;
        padding-left: 170px;
        padding-right: 130px;
        display: grid;
        grid-template-columns: repeat(5, 30fr);
        z-index: -1;

    }

    .grid-container img {
        width: 90%;
        height: 90%;
        object-fit: cover;
        justify-items: center;
        border-radius: 5px;
        background-color: rgb(53, 53, 53);
        cursor: pointer;



    }
    /*the opauqe gray to display the image better*/
    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #overlay img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
    }

    #prevButton,
    #nextButton {
        position: fixed;
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        background-color: rgba(49, 49, 49, 0.822);
        border-radius: 15px;
        width: 80px;
        height: 40px;


    }
    #prevButton {
        left: 50px;
    }

    #nextButton {
        right: 50px;
    }

    #closeButton {
        position: fixed;
        bottom: 20px;
        left: calc(50% - 40px); /* Adjust the value to position the close button */
        background-color: rgba(49, 49, 49, 0.822);
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        width: 30px;
        height: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 3px;
    }
            

    @media screen and (max-width: 1200px) {

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 8fr);
            grid-column-gap: 10px;
            padding-left: 10px;
            padding-right: 10px;
            
        }
        #prevButton,
    #nextButton {
        position: fixed;
        bottom: 20px;
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        background-color: rgba(49, 49, 49, 0.822);

    }
    #prevButton {
        left: 5px;
    }

    #nextButton {
        right: 5px;
    }
    }
</style>
<script>
    var images = document.querySelectorAll('.grid-container img');
    var currentIndex;

    function openImage(img) {
        var overlay = document.getElementById("overlay");
        var overlayImg = overlay.getElementsByTagName("img")[0];
        var prevButton = document.getElementById("prevButton");
        var nextButton = document.getElementById("nextButton");

        currentIndex = Array.from(images).indexOf(img);
        overlayImg.src = img.src;
        overlay.style.display = "flex";
        prevButton.style.display = "block"; // Display the previous button
        nextButton.style.display = "block"; // Display the next button

        overlay.addEventListener("touchstart", handleTouchStart, false);
        overlay.addEventListener("touchmove", handleTouchMove, false);
    }

    function handleTouchStart(event) {
            touchStartX = event.touches[0].clientX;
        }

    function handleTouchMove(event) {
                    if (!touchStartX) return;
                    var touchEndX = event.touches[0].clientX;
                    var deltaX = touchStartX - touchEndX;

                    if (deltaX > 10) {
                        nextImage();
                    } else if (deltaX < -10) {
                        prevImage();
                    }

                    touchStartX = null; // Reset touchStartX
                }

    function closeImage() {
            var overlay = document.getElementById("overlay");
            overlay.style.display = "none";

            // Remove touch event listeners when closing the image
        overlay.removeEventListener("touchstart", handleTouchStart);
        overlay.removeEventListener("touchmove", handleTouchMove);
        }

    

    function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            var overlayImg = document.querySelector("#overlay img");
            overlayImg.src = images[currentIndex].src;
        }

    function nextImage() {
        currentIndex = (currentIndex + 1) % images.length;
        var overlayImg = document.querySelector("#overlay img");
        overlayImg.src = images[currentIndex].src;
    }

</script>

    <style>

        }
    </style>
    <script>

        let mybutton = document.getElementById("myBtn");


        window.onscroll = function () { scrollFunction() };

        function scrollFunction() {
            if (document.body.scrollTop > 150 || document.documentElement.scrollTop > 700) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        }


        function topFunction() {
            document.body.scrollTop = 0; // safari
            document.documentElement.scrollTop = 0; // everything else
        }
    </script>
