    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 30fr);
            grid-gap: 10px;
            padding-left: 120px;
        }

        .grid-container img {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            object-fit: cover;
            cursor: pointer;
        }

        #enlargedImage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
        }

        .button-container {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }

        .previousButton,
        .nextButton {
            width: 50px;
            height: 50px;
            background-color: rgba(63, 63, 63, 0.808);
            border: none;
            cursor: pointer;
            margin: 5px;
            border-radius: 10px;
            color: white;
        }

        .closeButton {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            background-color: rgba(63, 63, 63, 0.808);
            border: none;
            cursor: pointer;
            border-radius: 10px;
            color: white;
            z-index: 10000;
            display: none;

        }

        @media screen and (max-width: 1200px) {
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 30fr);
            grid-gap: 10px;
            padding-left: 0;
        }

        .grid-container img {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            object-fit: cover;
            cursor: pointer;
        }

        #enlargedImage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
        }

        .button-container {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }

        .previousButton,
        .nextButton {
            width: 50px;
            height: 50px;
            background-color: rgba(63, 63, 63, 0.808);
            border: none;
            cursor: pointer;
            margin: 5px;
            border-radius: 10px;
            color: white;
        }

        .closeButton {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            background-color: rgba(63, 63, 63, 0.808);
            border: none;
            cursor: pointer;
            border-radius: 10px;
            color: white;
            z-index: 10000;

        }
    }
    </style>
</head>

    <script>
        var images = [
            'images/3.jpg',
            'images/4.png',
            'images/5.jpg',
            'images/6.jpg',
            'images/9.png',
            'images/10.jpg',
            'images/11.jpg',
            'images/17.png',
            'images/18.jpg',
            'images/19.jpg',
            'images/23.jpg',
            'images/24.jpg',
            'images/27.png',
            'images/31.jpg',
            'images/38.png',
            'images/40.jpg',
            'images/43.png',
            'images/37.jpg',
            'images/44.jpg',
            'images/45.jpg'
        ];

        var currentIndex = 0;
        var touchStartX = 0;
        var touchEndX = 0;

        function openImage(imageSrc) {
            var enlargedImage = document.getElementById('enlargedImage');
            var buttons = document.querySelectorAll('.button');
            var closeButton = document.querySelector('.closeButton');


            buttons.forEach(function (button) {
                button.style.display = 'block';
            });

            enlargedImage.src = imageSrc;
            enlargedImage.style.display = 'block';
            currentIndex = images.indexOf(imageSrc);
            document.querySelector('.button-container').style.display = 'block';
            closeButton.style.display = 'block';
        }

        function closeImage() {
            var enlargedImage = document.getElementById('enlargedImage');
            var buttons = document.querySelectorAll('.button');
            var closeButton = document.querySelector('.closeButton');

            buttons.forEach(function (button) {
                button.style.display = 'none';
            });

            enlargedImage.style.display = 'none';
            closeButton.style.display ='none';
            document.querySelector('.button-container').style.display = 'none';
        }

        function previousImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            var previousImageSrc = images[currentIndex];
            openImage(previousImageSrc);
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            var nextImageSrc = images[currentIndex];
            openImage(nextImageSrc);
        }

        function handleTouchStart(event) {
            touchStartX = event.changedTouches[0].screenX;
            event.preventDefault(); // Prevent default touch behavior
        }

        function handleTouchEnd(event) {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
            event.preventDefault(); // Prevent default touch behavior
        }

        function handleSwipe() {
            var swipeThreshold = 50; // Adjust this value according to sensitivity

            if (touchStartX - touchEndX > swipeThreshold) {
                // Swiped left, go to next image
                nextImage();
            } else if (touchEndX - touchStartX > swipeThreshold) {
                // Swiped right, go to previous image
                previousImage();
            }
        }

        // Attach touch event listeners to the main image container
        var enlargedImage = document.getElementById('enlargedImage');
        enlargedImage.addEventListener('touchstart', handleTouchStart, false);
        enlargedImage.addEventListener('touchend', handleTouchEnd, false);
    </script>
