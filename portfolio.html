    <main>
        
        <div class="crosshatch" id="cross"></div>

        <style>

            .crosshatch {
                position: relative;
                height: 60px;
                width: 200px;
                rotate: 0deg;
                margin-top: 300px;
                margin-left: 100px;
                background-color: transparent;
                rotate: -90deg;
                opacity: 50%;
                transition: ease-in-out;
            }

            .crosshatch:before {
                content: '';
                position: absolute;
                top: 15px;
                left: 0;
                height: 20%;
                width: 100%;
                background: rgb(0, 0, 0);
                transform: skew(0deg, 30deg);
                transition: ease-in-out;
                
            }


            .crosshatch:after {
                content: '';
                position: absolute;
                top: 50px;
                left: 0;
                height: 20%;
                width: 100%;
                background: rgb(0, 0, 0);
                transform: skew(0deg, -30deg);
                transition: ease-in-out;

            }
           
        </style>
