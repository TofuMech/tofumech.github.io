        <script>
            function displayRandomText() {
                var quotes = [
                    "[TAKE YOUR TIME]",
                    "[LOADING..]",
                    "[DRINK WATER]",
                    "[CLEAN YOUR SCREEN]",
                    "[FUCK UNITY]",
                    "[]",
                    "[C]",
                    "[C]"
                ];
                var randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById("hometitleTagline").innerHTML = quotes[randomIndex];
            }
        </script>

        <body onload="displayRandomText()"></body>

<body>
    <main>

            <style>
                a {

                }

                }

                    position: absolute;

                    border-radius: 5px;


                }
            

                

                .musicCard {
                    position: absolute;
                    background-size: cover;
                    padding: 2rem 0 0;
                    top: 750px;
                    width: 50%;
                    right: 25%;
                    border-radius: 5px;
                    color: rgb(0, 0, 0);
                    font-family: 'Big Shoulders Display', cursive;
                    font-family: 'Lilita One', cursive;
                    font-size: medium;
                    text-align: center;
                    z-index: 3;
                    filter: drop-shadow(0 20px 10px #131736d3);

                    display: block;
                }
